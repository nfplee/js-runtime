<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Test</title>
    <link href="/css/app.css" rel="stylesheet" />
    <script type="module" src="/js/app.js"></script>
</head>
<body>
    <header>Test</header>
    <nav>
        <ul>
            <li><strong><a href="/">Home</a></strong></li>
            <li><a href="/page.html">Page</a></li>
        </ul>
    </nav>
    <main>
        <h1>Home</h1>
        <di v-scope @notify="alert('Notified!')">
            <button @click="$dispatch('notify')">Notify</button>
        </div>
        <button id="update">Update</button>
        <div id="container"></div>
        <script type="module">
            import { process } from '/lib/runtime.js';

            document.getElementById('update').addEventListener('click', () => {
                document.getElementById('container').innerHTML = `<div v-scope="{ count: 0 }">
                        <span v-text="count"></span>
                        <button v-on:click="count++">inc</button>
                    </div>`;
                process(document.getElementById('container'));
            });
        </script>
    </main>
    <script type="module">
        import { start } from '/lib/runtime.js';
        start();
    </script>
</body>
</html>
